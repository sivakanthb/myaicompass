<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ — AI Compass</title>
  <meta name="description" content="Frequently asked questions about AI, GitHub, vibe coding, security, and getting started with AI-powered development." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* FAQ-specific styles */
    .faq-grid {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 0 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .faq-category-section { margin-bottom: 24px; }
    .faq-category-heading {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--color-accent-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .faq-category-heading .cat-icon {
      font-size: 1.1rem;
    }
    .faq-category-count {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--color-text-muted);
      background: var(--color-bg);
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: auto;
    }
    .faq-item {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .faq-item:hover { border-color: var(--color-accent); }
    .faq-item.open { box-shadow: var(--shadow-md); border-color: var(--color-accent); }
    .faq-question {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-text);
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      font-family: var(--font-sans);
      transition: color var(--transition);
      user-select: none;
    }
    .faq-question:hover { color: var(--color-accent); }
    .faq-item.open .faq-question { color: var(--color-accent); }
    .faq-question .q-icon {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--color-accent-light);
      color: var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 800;
    }
    .faq-item.open .faq-question .q-icon {
      background: var(--color-accent);
      color: #fff;
    }
    .faq-question .q-text { flex: 1; }
    .faq-chevron {
      flex-shrink: 0;
      font-size: 0.7rem;
      color: var(--color-text-muted);
      transition: transform 0.3s ease;
    }
    .faq-item.open .faq-chevron { transform: rotate(180deg); }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
      padding: 0 20px;
    }
    .faq-item.open .faq-answer {
      max-height: 600px;
      padding: 0 20px 18px;
    }
    .faq-answer-inner {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      line-height: 1.7;
      padding-top: 4px;
      padding-left: 36px;
      border-top: 1px solid var(--color-border-light);
    }
    /* Stats bar */
    .faq-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 20px;
    }
    .faq-stat {
      text-align: center;
    }
    .faq-stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--color-accent);
    }
    .faq-stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav class="site-nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-brand">&#x1F9ED; AI Compass</a>
      <div class="nav-links">
        <a href="index.html">Tools</a>
        <a href="compare.html">Compare</a>
        <a href="stack.html">Build Stack</a>
        <a href="trends.html">Trends</a>
        <a href="prompts.html">Prompts</a>
        <a href="glossary.html">Glossary</a>
        <a href="learn.html">Learn</a>
        <a href="faq.html" class="active">FAQ</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===== HERO ===== -->
  <header class="page-hero">
    <div class="container">
      <h1>&#x2753; FAQ &amp; Knowledge Hub</h1>
      <p class="page-sub">Everything you need to know about AI, GitHub, vibe coding, and getting started — answered.</p>
      <div class="page-search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="faqSearch" placeholder="Search questions..." autocomplete="off" />
      </div>
      <div class="page-filter-bar" id="faqCats"></div>
      <div class="faq-stats" id="faqStats"></div>
    </div>
  </header>

  <!-- ===== COUNT ===== -->
  <p class="page-count" id="faqCount"></p>

  <!-- ===== FAQ GRID ===== -->
  <main class="container">
    <div class="faq-grid" id="faqGrid"></div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 AI Compass &middot; Built by <a href="https://sivakanth.vercel.app" target="_blank" rel="noopener noreferrer">Sivakanth Badigenchala</a></p>
      <p class="footer-sub">Inspired by <a href="https://airise.vercel.app" target="_blank" rel="noopener noreferrer">AiRISE</a></p>
    </div>
  </footer>

  <script>
    /* Nav toggle */
    document.getElementById('navToggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('open');
    });

    let faqs = [];
    let activeCat = 'all';

    /* Category icons */
    const catIcons = {
      'AI Fundamentals':      '&#x1F9E0;',
      'GitHub & DevOps':      '&#x1F4BB;',
      'Vibe Coding & Setup':  '&#x1F680;',
      'Security & Governance': '&#x1F512;',
      'AI Tools & Ecosystem': '&#x1F6E0;',
      'Getting Started':      '&#x1F331;'
    };

    /* Category display order */
    const catOrder = ['AI Fundamentals', 'GitHub & DevOps', 'Vibe Coding & Setup', 'Security & Governance', 'AI Tools & Ecosystem', 'Getting Started'];

    /* Escape HTML */
    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    /* Build category filter chips */
    function buildFilters() {
      const cats = [...new Set(faqs.map(f => f.category))];
      /* Sort by catOrder */
      cats.sort((a, b) => (catOrder.indexOf(a) - catOrder.indexOf(b)));
      const bar = document.getElementById('faqCats');
      bar.innerHTML = `<button class="filter-chip active" data-cat="all">All</button>` +
        cats.map(c => `<button class="filter-chip" data-cat="${esc(c)}">${esc(c)}</button>`).join('');

      bar.addEventListener('click', e => {
        const chip = e.target.closest('.filter-chip');
        if (!chip) return;
        activeCat = chip.dataset.cat;
        bar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        render();
      });
    }

    /* Build stats */
    function buildStats() {
      const cats = [...new Set(faqs.map(f => f.category))];
      document.getElementById('faqStats').innerHTML = `
        <div class="faq-stat"><div class="faq-stat-value">${faqs.length}</div><div class="faq-stat-label">Questions</div></div>
        <div class="faq-stat"><div class="faq-stat-value">${cats.length}</div><div class="faq-stat-label">Categories</div></div>
      `;
    }

    /* Render FAQ items */
    function render() {
      const search = document.getElementById('faqSearch').value.toLowerCase().trim();
      let filtered = faqs;
      if (activeCat !== 'all') filtered = filtered.filter(f => f.category === activeCat);
      if (search) filtered = filtered.filter(f =>
        f.question.toLowerCase().includes(search) || f.answer.toLowerCase().includes(search) || f.category.toLowerCase().includes(search)
      );

      document.getElementById('faqCount').textContent = `Showing ${filtered.length} of ${faqs.length} questions`;

      /* Group by category */
      const groups = {};
      filtered.forEach(f => {
        if (!groups[f.category]) groups[f.category] = [];
        groups[f.category].push(f);
      });

      const sortedCats = Object.keys(groups).sort((a, b) => catOrder.indexOf(a) - catOrder.indexOf(b));

      const grid = document.getElementById('faqGrid');
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><p>No matching questions found.</p></div>`;
        return;
      }

      grid.innerHTML = sortedCats.map(cat => `
        <div class="faq-category-section">
          <div class="faq-category-heading">
            <span class="cat-icon">${catIcons[cat] || '&#x2753;'}</span>
            ${esc(cat)}
            <span class="faq-category-count">${groups[cat].length}</span>
          </div>
          ${groups[cat].map(f => `
            <div class="faq-item" data-id="${f.id}">
              <button class="faq-question" onclick="toggleFaq(this)">
                <span class="q-icon">Q</span>
                <span class="q-text">${esc(f.question)}</span>
                <span class="faq-chevron">&#x25BC;</span>
              </button>
              <div class="faq-answer">
                <div class="faq-answer-inner">${esc(f.answer)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    /* Toggle single FAQ */
    function toggleFaq(btn) {
      const item = btn.closest('.faq-item');
      item.classList.toggle('open');
    }

    /* Search handler */
    document.getElementById('faqSearch').addEventListener('input', render);

    /* Init */
    async function init() {
      try {
        const res = await fetch('faq.json');
        faqs = await res.json();
      } catch (err) {
        document.getElementById('faqGrid').innerHTML = '<p style="color:#ef4444;padding:40px;text-align:center;">Failed to load FAQ data.</p>';
        return;
      }
      buildFilters();
      buildStats();
      render();
    }

    init();
  </script>

</body>
</html>
