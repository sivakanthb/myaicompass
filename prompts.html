<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library — AI Compass</title>
  <meta name="description" content="Ready-to-use AI prompts for every role — from developers to executives." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav class="site-nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-brand">🧭 AI Compass</a>
      <div class="nav-links">
        <a href="index.html">Tools</a>
        <a href="glossary.html">Glossary</a>
        <a href="prompts.html" class="active">Prompts</a>
        <a href="trends.html">Trends</a>
        <a href="learn.html">Learn</a>
        <a href="faq.html">FAQ</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===== HERO ===== -->
  <header class="page-hero">
    <div class="container">
      <h1>💬 Prompt Library</h1>
      <p class="page-sub">Production-grade prompts for agents, RAG, evaluation, and prompt engineering.</p>
      <div class="page-search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="promptSearch" placeholder="Search prompts…" autocomplete="off" />
      </div>
      <div class="page-filter-bar" id="roleFilters"></div>
    </div>
  </header>

  <!-- ===== COUNT ===== -->
  <p class="page-count" id="promptCount"></p>

  <!-- ===== GRID ===== -->
  <main class="container">
    <div class="prompt-grid" id="promptGrid"></div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 AI Tools Catalog &middot; Built by <a href="https://sivakanth.vercel.app" target="_blank" rel="noopener noreferrer">Sivakanth Badigenchala</a></p>
      <p class="footer-sub">Inspired by <a href="https://airise.vercel.app" target="_blank" rel="noopener noreferrer">AiRISE</a></p>
    </div>
  </footer>

  <script>
    /* Nav toggle */
    document.getElementById('navToggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('open');
    });

    let prompts = [];
    let activeRole = 'all';

    fetch('prompts.json')
      .then(r => r.json())
      .then(data => { prompts = data; buildFilters(); render(); });

    function buildFilters() {
      const roles = [...new Set(prompts.map(p => p.role))].sort();
      const bar = document.getElementById('roleFilters');
      bar.innerHTML = `<button class="filter-chip active" data-role="all">All Roles</button>` +
        roles.map(r => `<button class="filter-chip" data-role="${r}">${r}</button>`).join('');
      bar.addEventListener('click', e => {
        const chip = e.target.closest('.filter-chip');
        if (!chip) return;
        bar.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        chip.classList.add('active');
        activeRole = chip.dataset.role;
        render();
      });
    }

    function render() {
      const q = document.getElementById('promptSearch').value.toLowerCase().trim();
      const filtered = prompts.filter(p => {
        const matchRole = activeRole === 'all' || p.role === activeRole;
        const matchQ = !q || p.title.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q);
        return matchRole && matchQ;
      });

      document.getElementById('promptCount').textContent = `Showing ${filtered.length} of ${prompts.length} prompts`;
      document.getElementById('promptGrid').innerHTML = filtered.map((p, i) => `
        <div class="prompt-card">
          <h3>${escapeHtml(p.title)}</h3>
          <pre>${escapeHtml(p.prompt)}</pre>
          <div class="prompt-card-footer">
            <div><span class="prompt-role">${escapeHtml(p.role)}</span> <span class="prompt-cat">${escapeHtml(p.category)}</span></div>
            <button class="copy-btn" data-idx="${i}">📋 Copy</button>
          </div>
        </div>`).join('');

      /* Bind copy buttons */
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx, 10);
          const text = filtered[idx].prompt;
          navigator.clipboard.writeText(text).then(() => {
            btn.textContent = '✓ Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 1500);
          });
        });
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('promptSearch').addEventListener('input', render);
  </script>
</body>
</html>
